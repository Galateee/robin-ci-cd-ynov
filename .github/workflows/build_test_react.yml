name: Build and Test React Application

on:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: "http://localhost:5173/robin-ci-cd-ynov/"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: "true"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Check version and decide publish
        id: version-check
        run: |
          LOCAL_VERSION=$(node -p "require('./app/package.json').version")
          PUBLISHED_VERSION=$(npm show robin-ci-cd-ynov version 2>/dev/null || echo "0.0.0")
          echo "Local version: $LOCAL_VERSION"
          echo "Published version: $PUBLISHED_VERSION"
          IS_NEWER=$(node -e "
            const semver = (v) => v.split('.').map(Number);
            const [la, lb, lc] = semver('$LOCAL_VERSION');
            const [pa, pb, pc] = semver('$PUBLISHED_VERSION');
            const newer = la > pa || (la === pa && lb > pb) || (la === pa && lb === pb && lc > pc);
            console.log(newer ? 'true' : 'false');
          ")
          echo "should_publish=$IS_NEWER" >> $GITHUB_OUTPUT

      - name: Build NPM package
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && pnpm run build-npm

      - name: Publish to NPM
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version already published)
        if: steps.version-check.outputs.should_publish == 'false'
        run: echo "Version already published on NPM, skipping publish step."

  docker-integration-test:
    needs: publish-npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MySQL Image
        run: |
          cd app
          docker build -f server/Dockerfile.mysql -t mysql-ynov:latest .

      - name: Build API Image
        run: |
          cd app/server
          docker build -t robin-ci-cd-ynov:latest .

      - name: Create Docker Network
        run: docker network create ynov-network

      - name: Start MySQL Container
        run: |
          docker run -d \
            --name mysql-container \
            --network ynov-network \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=ynov_ci \
            mysql-ynov:latest

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in $(seq 1 20); do
            if docker exec mysql-container mysqladmin ping -h localhost -u root --password=${{ secrets.MYSQL_ROOT_PASSWORD }} --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/20 - waiting..."
            sleep 3
          done

      - name: Start API Container
        run: |
          docker run -d \
            --name api-container \
            --network ynov-network \
            -p 8000:8000 \
            -e MYSQL_HOST=mysql-container \
            -e MYSQL_USER=root \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=ynov_ci \
            robin-ci-cd-ynov:latest

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          sleep 5

      - name: Test API /users endpoint
        run: |
          echo "Testing /users endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8000/users)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status Code: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          if echo "$BODY" | grep -q '"utilisateurs":\[\]'; then
            echo "Error: Users list is empty"
            exit 1
          fi

          echo "✓ API validation successful!"

      - name: Stop and remove containers
        if: always()
        run: |
          docker stop api-container mysql-container || true
          docker rm api-container mysql-container || true
          docker network rm ynov-network || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push API Image to Docker Hub
        run: |
          docker tag robin-ci-cd-ynov:latest ${{ secrets.DOCKERHUB_USERNAME }}/robin-ci-cd-ynov:latest
          docker tag robin-ci-cd-ynov:latest ${{ secrets.DOCKERHUB_USERNAME }}/robin-ci-cd-ynov:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/robin-ci-cd-ynov:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/robin-ci-cd-ynov:${{ github.sha }}

  deploy:
    needs: docker-integration-test
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4
